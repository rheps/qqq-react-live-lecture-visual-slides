<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>컴포넌트 갤러리 v2 — 스킬 생성판 (React + Framer Motion + 모션 키트)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  :root{ --blue:#3B82F6; --sky:#0EA5E9; --teal:#14B8A6; --ink:#0F172A; --mut:#475569; --grid:#E2E8F0; }
  *{box-sizing:border-box; word-break:keep-all;}
  html,body{margin:0;padding:0;}
  body{ font-family:"Pretendard","Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif;
    color:var(--ink); background:linear-gradient(135deg,#EFF6FF 0%,#F0FDFA 50%,#F0F9FF 100%);
    background-attachment:fixed; min-height:100vh; }
  .blob{position:fixed;border-radius:50%;filter:blur(60px);z-index:0;pointer-events:none;}
  .blob1{top:-12vh;left:-8vw;width:46vh;height:46vh;background:radial-gradient(circle,rgba(59,130,246,.22),transparent 70%);animation:fl1 20s ease-in-out infinite;}
  .blob2{bottom:-14vh;right:-6vw;width:52vh;height:52vh;background:radial-gradient(circle,rgba(20,184,166,.18),transparent 70%);animation:fl2 24s ease-in-out infinite;}
  @keyframes fl1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.06)}}
  @keyframes fl2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,-26px) scale(1.08)}}
  .wrap{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:40px 28px 120px;}
  header.hero{text-align:center;margin-bottom:8px;}
  header.hero h1{font-size:42px;font-weight:900;letter-spacing:-.03em;margin:0 0 10px;}
  header.hero h1 span{background:linear-gradient(135deg,var(--blue),var(--sky));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  header.hero p{font-size:16px;font-weight:500;color:var(--mut);max-width:820px;margin:6px auto;line-height:1.65;}
  header.hero .tag{display:inline-block;margin-top:8px;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--blue),var(--sky));padding:5px 14px;border-radius:999px;}
  section{margin-top:34px;}
  section h2{font-size:24px;font-weight:900;letter-spacing:-.02em;margin:0 0 16px;display:flex;align-items:center;gap:12px;}
  section h2 small{font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--blue),var(--sky));padding:3px 12px;border-radius:999px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px;}
  .card{ background:rgba(255,255,255,.55); backdrop-filter:blur(16px) saturate(1.3); -webkit-backdrop-filter:blur(16px) saturate(1.3);
    border:1px solid rgba(255,255,255,.75); border-radius:16px; box-shadow:0 10px 28px rgba(0,0,0,.07); padding:14px 16px; }
  .chead{display:flex;align-items:center;gap:11px;margin-bottom:8px;}
  .num{flex:none;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:16px;color:#fff;background:linear-gradient(135deg,var(--blue),var(--sky));box-shadow:0 5px 14px rgba(59,130,246,.4);}
  .names{display:flex;flex-direction:column;line-height:1.25;flex:1;}
  .names b{font-size:15px;font-weight:800;}
  .names i{font-size:12.5px;font-style:normal;color:var(--mut);font-weight:600;}
  .type{font-size:10.5px;font-weight:700;color:var(--blue);background:rgba(59,130,246,.1);padding:3px 8px;border-radius:6px;}
  .stage{display:flex;align-items:center;justify-content:center;padding:12px 6px;min-height:160px;}
  footer{margin-top:60px;text-align:center;font-size:13px;color:var(--mut);}
  @media(max-width:520px){.grid{grid-template-columns:1fr;}header.hero h1{font-size:32px;}}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div id="root"></div>

<!-- 1) 모션 키트(클래식 스크립트) — React/Babel 앞. window.QQQ 노출 + 키프레임 자동 주입 -->
<script src="references/qqq-component-kit.js"></script>

<!-- 2) React + Framer Motion + Babel (스킬 표준 로더 순서) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<!-- 3) 스킬 통합 패턴: GalleryComponent(키트) + MotionItem(FM 등장) -->
<script type="text/babel" data-presets="react">
const {useRef, useEffect} = React;
const FM = window.Motion || {};
const M_OK = !!(FM && FM.motion);
const MDiv = M_OK ? FM.motion.div : "div";

const CATS={A:"텍스트 강조",B:"키워드·목록 (List)",C:"비교·관계",D:"흐름·과정 (Process)",E:"주기·순환 (Cycle)",F:"계층·구조 (Hierarchy)",G:"타임라인",H:"수업·발문",I:"정리·마무리",J:"데이터 차트 (권장)",K:"PPT 차트 추가분",L:"사료·출처",M:"표"};
const ORDER=["A","B","C","D","E","F","G","H","I","J","K","L","M"];

// 스킬 통합 래퍼: 번호 → 갤러리와 동일한 컴포넌트 렌더 + 루프 모션
function GalleryComponent({n}){
  const ref=useRef(null);
  useEffect(()=>{ if(ref.current && window.QQQ) window.QQQ.mount(n, ref.current); },[n]);
  return <div className="stage" ref={ref}/>;
}

// Framer Motion 카드 등장(바깥) + 키트 모션(안쪽). 다른 노드라 충돌 없음.
function Card({c, idx}){
  const enter = M_OK ? {
    initial:{opacity:0, y:26, scale:.84},
    animate:{opacity:1, y:0, scale:1},
    transition:{type:"spring", stiffness:240, damping:18, delay:(idx%8)*0.05}
  } : {};
  return (
    <MDiv className="card" {...enter}>
      <div className="chead">
        <span className="num">{c.n}</span>
        <span className="names"><b>{c.en}</b><i>{c.ko}</i></span>
        <span className="type">{c.type}</span>
      </div>
      <GalleryComponent n={c.n}/>
    </MDiv>
  );
}

function App(){
  const comps = Object.values(window.QQQ.byN).sort((a,b)=>a.n-b.n);
  let idx=0;
  return (
    <div className="wrap">
      <header className="hero">
        <h1>컴포넌트 갤러리 <span>v2</span></h1>
        <p>이 페이지는 <b>오직 스킬의 방식</b>으로 만들었습니다 — 모션 키트(<code>window.QQQ.mount</code>) + React + Framer Motion.
           <b>카드 등장</b>은 Framer Motion(스프링 팝), <b>컴포넌트 내부 움직임</b>은 모션 키트. 원본 갤러리와 동일하게 움직입니다.</p>
        <span className="tag">React + Framer Motion + QQQ 모션 키트</span>
      </header>
      {ORDER.map(cat=>{
        const items=comps.filter(c=>c.cat===cat);
        if(!items.length) return null;
        return (
          <section key={cat}>
            <h2>{CATS[cat]} <small>{items[0].n}–{items[items.length-1].n}</small></h2>
            <div className="grid">{items.map(c=> <Card key={c.n} c={c} idx={idx++}/> )}</div>
          </section>
        );
      })}
      <footer>component-gallery-v2.html · 스킬(qqq-component-kit.js + SKILL.md 통합 패턴)으로 생성 · 원본: component-gallery.html</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
window.__v2 = ()=>({
  hasQQQ:!!window.QQQ, FM:M_OK,
  cards:document.querySelectorAll(".card").length,
  stages:document.querySelectorAll(".stage").length,
  animed:[...document.querySelectorAll(".stage")].filter(s=>s.dataset.animed).length,
  smil:document.querySelectorAll(".stage animateMotion, .stage animateTransform").length
});
</script>
</body>
</html>
